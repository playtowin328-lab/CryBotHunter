name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile backend
        run: python -m compileall app tests
      - name: Validate process entrypoint
        run: sh -n entrypoint.sh
      - name: Import every process module
        run: python -c "import app.main, app.telegram_worker, app.trader_worker, app.candle_worker, app.optimizer_worker, app.rl_worker"
      - name: Check Alembic heads
        run: alembic heads
      - name: Run backend tests
        env:
          PAPER_TRADING: "true"
          LIVE_TRADING_ENABLED: "false"
          EXCHANGE_SANDBOX_ENABLED: "true"
          ALLOW_LIVE_TRADING_WITHOUT_SANDBOX: "false"
          MARKET_DATA_MODE: "paper"
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
