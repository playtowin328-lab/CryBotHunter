services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trader}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-trader} -d $${POSTGRES_DB:-trader}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      APP_PROCESS: web
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      PAPER_TRADING: ${PAPER_TRADING:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_TRADE_REPORTS_ENABLED: ${TELEGRAM_TRADE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORTS_ENABLED: ${TELEGRAM_CYCLE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES: ${TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES:-15}
      TRADER_LOOP_SECONDS: ${TRADER_LOOP_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - trade_memory_data:/app/data
    ports:
      - "8000:8000"

  telegram:
    build: ./backend
    profiles: ["workers", "telegram"]
    environment:
      APP_PROCESS: telegram
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      PAPER_TRADING: ${PAPER_TRADING:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_TRADE_REPORTS_ENABLED: ${TELEGRAM_TRADE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORTS_ENABLED: ${TELEGRAM_CYCLE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES: ${TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES:-15}
      TRADER_LOOP_SECONDS: ${TRADER_LOOP_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  trader:
    build: ./backend
    profiles: ["workers", "trader"]
    environment:
      APP_PROCESS: trader
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      PAPER_TRADING: ${PAPER_TRADING:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_TRADE_REPORTS_ENABLED: ${TELEGRAM_TRADE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORTS_ENABLED: ${TELEGRAM_CYCLE_REPORTS_ENABLED:-true}
      TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES: ${TELEGRAM_CYCLE_REPORT_INTERVAL_MINUTES:-15}
      TRADER_LOOP_SECONDS: ${TRADER_LOOP_SECONDS:-60}
      PAPER_EXPLORATION_ENABLED: ${PAPER_EXPLORATION_ENABLED:-false}
      PAPER_EXPLORATION_MIN_SCORE: ${PAPER_EXPLORATION_MIN_SCORE:-65}
      PAPER_EXPLORATION_RISK_PERCENT: ${PAPER_EXPLORATION_RISK_PERCENT:-0.25}
      PAPER_EXPLORATION_MAX_POSITIONS: ${PAPER_EXPLORATION_MAX_POSITIONS:-2}
      PAPER_EXPLORATION_COOLDOWN_MINUTES: ${PAPER_EXPLORATION_COOLDOWN_MINUTES:-240}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - trade_memory_data:/app/data

  candles:
    build: ./backend
    profiles: ["workers", "candles"]
    environment:
      APP_PROCESS: candles
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      PAPER_TRADING: ${PAPER_TRADING:-true}
      MARKET_DATA_MODE: ${MARKET_DATA_MODE:-ccxt}
      CANDLE_INGEST_SYMBOLS: ${CANDLE_INGEST_SYMBOLS:-BTC/USDT,ETH/USDT,SOL/USDT,BNB/USDT,XRP/USDT}
      CANDLE_INGEST_TIMEFRAMES: ${CANDLE_INGEST_TIMEFRAMES:-1h}
      CANDLE_INGEST_LOOP_SECONDS: ${CANDLE_INGEST_LOOP_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  optimizer:
    build: ./backend
    profiles: ["workers", "optimizer"]
    environment:
      APP_PROCESS: optimizer
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      STRATEGY_OPTIMIZER_WORKER_ENABLED: ${STRATEGY_OPTIMIZER_WORKER_ENABLED:-true}
      STRATEGY_OPTIMIZER_LOOP_SECONDS: ${STRATEGY_OPTIMIZER_LOOP_SECONDS:-21600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  rl:
    build:
      context: ./backend
      dockerfile: Dockerfile.rl
    profiles: ["workers", "rl"]
    environment:
      APP_PROCESS: rl
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://trader:trader@postgres:5432/trader}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-replace-with-long-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-replace-with-valid-fernet-key}
      PAPER_TRADING: "true"
      LIVE_TRADING_ENABLED: "false"
      MARKET_DATA_MODE: ${MARKET_DATA_MODE:-ccxt}
      RL_TRAINER_ENABLED: ${RL_TRAINER_ENABLED:-true}
      RL_PREDICTION_LOOP_SECONDS: ${RL_PREDICTION_LOOP_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      PORT: 80
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  trade_memory_data:
